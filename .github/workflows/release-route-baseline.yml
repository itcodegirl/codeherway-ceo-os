name: Release Route Baseline Refresh

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: Why are you refreshing the route baseline?
        required: true
        type: string

jobs:
  refresh-baseline:
    name: Refresh Route Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Refresh Baseline (Release-Governed)
        env:
          ROUTE_BASELINE_REFRESH_APPROVED: "true"
        run: npm run update:route-budgets:baseline:release

      - name: Upload Refreshed Baseline
        uses: actions/upload-artifact@v4
        with:
          name: route-performance-baseline
          path: scripts/route-performance-baseline.json
          if-no-files-found: error
          retention-days: 30

      - name: Create Baseline Refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh route performance baseline for release"
          title: "chore: refresh route performance baseline for release"
          body: |
            Automated release-only refresh of route performance baseline.

            This PR is generated by the **Release Route Baseline Refresh** workflow.
          branch: "chore/release-route-baseline-refresh"
          delete-branch: true
