name: Release Route Baseline Refresh

# Triggers:
#   - release: refresh on every published release (canonical path)
#   - workflow_dispatch: manual refresh with a stated reason
#   - schedule: weekly refresh so the baseline does not silently drift past
#     the CI trend gate's +8% tolerance between releases. The workflow
#     opens a PR rather than committing directly to main, so the refresh
#     still gets human review.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: Why are you refreshing the route baseline?
        required: true
        type: string
  schedule:
    # Monday 10:00 UTC. Off-hours for most time zones; lands a refresh PR
    # at the start of the week when someone is likely reviewing.
    - cron: '0 10 * * 1'

jobs:
  refresh-baseline:
    name: Refresh Route Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Refresh Baseline (Release-Governed)
        env:
          ROUTE_BASELINE_REFRESH_APPROVED: "true"
        run: npm run update:route-budgets:baseline:release

      - name: Upload Refreshed Baseline
        uses: actions/upload-artifact@v4
        with:
          name: route-performance-baseline
          path: scripts/route-performance-baseline.json
          if-no-files-found: error
          retention-days: 30

      - name: Create Baseline Refresh PR
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(perf): refresh route performance baseline (${{ github.event_name }})"
          title: "chore(perf): refresh route performance baseline (${{ github.event_name }})"
          body: |
            Automated refresh of `scripts/route-performance-baseline.json`.

            **Trigger:** `${{ github.event_name }}`
            **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ## Why
            The `check:route-budgets:trend` CI gate compares per-route bundle
            sizes against this baseline with a +8% regression tolerance. Without
            a refresh, the baseline can drift past that tolerance and turn the
            trend gate red on every PR even when nothing has regressed.

            The previous refresh policy was release-only, which let the baseline
            drift for as long as no release shipped. The workflow now also
            refreshes on a weekly schedule so drift is bounded by a week, with
            human review on the resulting PR.

            ## Review checklist
            - [ ] Diff the route sizes — large jumps in a single route are
                  worth investigating before merging the baseline.
            - [ ] Confirm `npm run check:route-budgets:trend` passes locally
                  if you want to validate before merge.
          branch: "chore/release-route-baseline-refresh"
          delete-branch: true
