name: PR Test Suite

on:
  pull_request:
    branches:
      - '**'

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browser
        run: npx playwright install --with-deps chromium

      - name: Run Lint
        run: npm run lint

      - name: Run Build
        run: npm run build

      - name: Check Route Performance Budgets
        run: npm run check:route-budgets

      - name: Check Route Performance Trend Baseline
        run: npm run check:route-budgets:trend

      - name: Generate Route Size Diff Report
        run: npm run report:route-budgets

      - name: Check Crud Template Legacy Props Deadline
        run: npm run check:crud-template-legacy

      - name: Run Unit Tests
        run: npm run test:run

      - name: Run Telemetry Integration Tests (Supabase)
        if: ${{ secrets.SUPABASE_TEST_URL != '' && secrets.SUPABASE_TEST_SERVICE_ROLE_KEY != '' }}
        env:
          SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
        run: npm run test:integration:telemetry

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Playwright E2E
        run: npm run test:e2e

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright Traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Route Size Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: route-size-report
          path: artifacts/route-size-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Comment Route Size Diff on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          ROUTE_REPORT_PATH: artifacts/route-size-report.md
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- route-size-diff-report -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request?.number;

            if (!issue_number) {
              core.info('No pull request number in event context. Skipping route-size comment.');
              return;
            }

            let reportContent = 'Route-size report was not generated in this run.';
            if (fs.existsSync(process.env.ROUTE_REPORT_PATH)) {
              const rawReport = fs.readFileSync(process.env.ROUTE_REPORT_PATH, 'utf8').trim();
              reportContent = rawReport || reportContent;
            }

            const body = `${marker}\n${reportContent}`;

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find((comment) => (
                comment.user?.type === 'Bot'
                && typeof comment.body === 'string'
                && comment.body.includes(marker)
              ));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
                core.info(`Updated existing route-size report comment (${existing.id}).`);
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
                core.info('Posted new route-size report comment.');
              }
            } catch (error) {
              core.warning(`Unable to post route-size report PR comment: ${error.message}`);
            }
